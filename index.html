<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>2026 SEC WBB Tournament</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800&family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Barlow',sans-serif;background:#F7F5F2}
    button{cursor:pointer;font-family:'Barlow',sans-serif}
    ::-webkit-scrollbar{width:4px;height:4px}
    ::-webkit-scrollbar-thumb{background:#C8AD82;border-radius:2px}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const { useState, useRef } = React;

const NAVY="#002B5C", GOLD="#C8AD82", BG="#F7F5F2", WHITE="#FFFFFF";

const SC = {
  "Arkansas":          "#9D2235","Kentucky":          "#0033A0",
  "Mississippi State": "#5D1725","Florida":           "#0021A5",
  "Auburn":            "#E87722","Texas A&M":         "#500000",
  "Missouri":          "#F1B82D","Alabama":           "#9E1B32",
  "Georgia":           "#BA0C2F","Oklahoma":          "#841617",
  "Ole Miss":          "#CE1126","Tennessee":         "#FF8200",
  "South Carolina":    "#73000A","LSU":               "#461D7C",
  "Vanderbilt":        "#866D3A","Texas":             "#BF5700",
};

const SEEDS = {
  "Arkansas":16,"Kentucky":9,"Mississippi State":13,"Florida":12,
  "Auburn":15,"Texas A&M":10,"Missouri":14,"Alabama":11,
  "Georgia":8,"Oklahoma":5,"Ole Miss":7,"Tennessee":6,
  "South Carolina":1,"LSU":4,"Vanderbilt":2,"Texas":3,
};

const ROUNDS = [
  {key:"r1", label:"First Round",   sub:"Wed · Mar 4"},
  {key:"r2", label:"Second Round",  sub:"Thu · Mar 5"},
  {key:"qf", label:"Quarterfinals", sub:"Fri · Mar 6"},
  {key:"sf", label:"Semifinals",    sub:"Sat · Mar 7"},
  {key:"fin",label:"Championship",  sub:"Sun · Mar 8"},
];

const STATS = {
  g1:{
    score1:"64",score2:"94",
    q1_1:"10",q2_1:"23",q3_1:"10",q4_1:"21",
    q1_2:"29",q2_2:"13",q3_2:"28",q4_2:"24",
    reb1:"27",ast1:"11",reb2:"52",ast2:"22",
    star1:"Taleyah Jones",starSt1:"21 pts · 7-18 FG · 3 reb · 3 ast",
    star2:"Clara Strack", starSt2:"20 pts · 13 reb (double-double)",
    notes:"Kentucky steamrolled Arkansas from the opening tip, never trailing. The Wildcats dominated the glass 52-27 and forced 20 turnovers, converting them into 15 points. Clara Strack's 20-13 double-double was the story of the game.",
  },
  g2:{
    score1:"68",score2:"86",
    q1_1:"11",q2_1:"19",q3_1:"16",q4_1:"22",
    q1_2:"21",q2_2:"25",q3_2:"26",q4_2:"14",
    reb1:"34",ast1:"13",reb2:"40",ast2:"18",
    star1:"Destiney McPhaul",starSt1:"12 pts · 6 ast · 2-4 from 3",
    star2:"Me'Arah O'Neal",  starSt2:"22 pts · 4 reb",
    notes:"Florida controlled the pace from the start and never trailed. The Gators' bench exploded for 33 points and outrebounded MSU 40-34. McPhaul kept Mississippi State competitive but Florida was simply the deeper team.",
  },
  g4:{
    score1:"48",score2:"65",
    q1_1:"9", q2_1:"11",q3_1:"17",q4_1:"11",
    q1_2:"13",q2_2:"18",q3_2:"10",q4_2:"24",
    reb1:"36",ast1:"11",reb2:"48",ast2:"19",
    star1:"Jordana Reisma",starSt1:"15 pts · 7-8 FG · 5 reb",
    star2:"Diana Collins",  starSt2:"13 pts · 5-7 FG · 3-5 from 3 · 6 reb",
    notes:"Alabama pulled away in a big 4th quarter, outscoring Missouri 24-11 to close it out. The Tide dominated the glass 48-36 and had the better ball movement all night with 19 assists to Missouri's 11.",
  },
    score1:"50",score2:"49",
    q1_1:"12",q2_1:"11",q3_1:"15",q4_1:"12",
    q1_2:"11",q2_2:"10",q3_2:"15",q4_2:"13",
    reb1:"38",ast1:"11",reb2:"26",ast2:"8",
    star1:"Kaitlyn Duhon", starSt1:"14 pts · 7 reb · 6-14 FG",
    star2:"Ny'Ceara Pryor",starSt2:"25 pts · 9-17 FG · 5-9 FT",
    notes:"An instant classic. Ny'Ceara Pryor scored 25 — more than half of A&M's total — but Auburn survived by dominating the boards 38-26. One point separated these two teams at the final buzzer.",
  },
};

function initBracket() {
  const b = {
    r1:[
      {id:"g1",t1:"Arkansas",         t2:"Kentucky", winner:null,time:"11:00 AM"},
      {id:"g2",t1:"Mississippi State",t2:"Florida",  winner:null,time:"1:30 PM"},
      {id:"g3",t1:"Auburn",           t2:"Texas A&M",winner:null,time:"6:00 PM"},
      {id:"g4",t1:"Missouri",         t2:"Alabama",  winner:null,time:"8:30 PM"},
    ],
    r2:[
      {id:"g5",t1:null,t2:"Georgia",  winner:null,time:"11:00 AM"},
      {id:"g6",t1:null,t2:"Oklahoma", winner:null,time:"1:30 PM"},
      {id:"g7",t1:null,t2:"Ole Miss", winner:null,time:"6:00 PM"},
      {id:"g8",t1:null,t2:"Tennessee",winner:null,time:"8:30 PM"},
    ],
    qf:[
      {id:"g9", t1:"South Carolina",t2:null,winner:null,time:"12:00 PM"},
      {id:"g10",t1:"LSU",           t2:null,winner:null,time:"2:30 PM"},
      {id:"g11",t1:"Vanderbilt",    t2:null,winner:null,time:"6:00 PM"},
      {id:"g12",t1:"Texas",         t2:null,winner:null,time:"8:30 PM"},
    ],
    sf:[
      {id:"g13",t1:null,t2:null,winner:null,time:"4:30 PM"},
      {id:"g14",t1:null,t2:null,winner:null,time:"7:00 PM"},
    ],
    fin:[{id:"g15",t1:null,t2:null,winner:null,time:"3:00 PM"}],
  };
  b.r1[0].winner="Kentucky";  b.r2[0].t1="Kentucky";
  b.r1[1].winner="Florida";   b.r2[1].t1="Florida";
  b.r1[2].winner="Auburn";    b.r2[2].t1="Auburn";
  b.r1[3].winner="Alabama";   b.r2[3].t1="Alabama";
  return b;
}

function propagate(b,round,idx,winner){
  if(round==="r1") b.r2[idx].t1=winner;
  if(round==="r2") b.qf[idx].t2=winner;
  if(round==="qf"){const s=idx<2?0:1; idx%2===0?(b.sf[s].t1=winner):(b.sf[s].t2=winner);}
  if(round==="sf") idx===0?(b.fin[0].t1=winner):(b.fin[0].t2=winner);
}

function pc(t){return t&&SC[t]?SC[t]:"#aaa";}
function rgb(h){
  if(!h||h.length<7)return"100,100,100";
  return parseInt(h.slice(1,3),16)+","+parseInt(h.slice(3,5),16)+","+parseInt(h.slice(5,7),16);
}

// ── Header ─────────────────────────────────────────────────
function Header(props){
  if(props.back){
    return React.createElement("div",{style:{background:NAVY,borderBottom:"3px solid "+GOLD,padding:"12px 16px",display:"flex",alignItems:"center",gap:12,flexShrink:0}},
      React.createElement("button",{onClick:props.back,style:{background:"none",border:"1px solid rgba(200,173,130,0.4)",color:GOLD,borderRadius:4,padding:"5px 12px",fontFamily:"'Barlow',sans-serif",fontWeight:600,fontSize:11,letterSpacing:1}},"← Back"),
      React.createElement("div",null,
        React.createElement("div",{style:{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:16,color:WHITE,letterSpacing:1}},props.title),
        React.createElement("div",{style:{fontSize:11,color:GOLD,fontWeight:500,fontFamily:"'Barlow',sans-serif",marginTop:1}},props.sub)
      )
    );
  }
  return React.createElement("div",{style:{background:NAVY,borderBottom:"3px solid "+GOLD,padding:"14px 16px",textAlign:"center",flexShrink:0}},
    React.createElement("div",{style:{fontSize:9,letterSpacing:4,color:GOLD,fontWeight:600,fontFamily:"'Barlow',sans-serif",marginBottom:3,opacity:.85}},"2026 · GREENVILLE, SC"),
    React.createElement("div",{style:{fontSize:22,fontWeight:700,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:3,color:WHITE,lineHeight:1}},"SEC WOMEN'S BASKETBALL"),
    React.createElement("div",{style:{fontSize:11,fontWeight:600,fontFamily:"'Barlow',sans-serif",letterSpacing:4,color:GOLD,marginTop:4,opacity:.9}},"TOURNAMENT"),
    React.createElement("div",{style:{fontSize:9,color:"#a0b8d0",letterSpacing:2,marginTop:4,fontWeight:400,fontFamily:"'Barlow',sans-serif",opacity:.7}},"BON SECOURS WELLNESS ARENA")
  );
}

// ── App ────────────────────────────────────────────────────
function App(){
  const [bracket,setBracket]=useState(initBracket);
  const [userStats,setUserStats]=useState({});
  const [activeRound,setActiveRound]=useState(0);
  const [gameCard,setGameCard]=useState(null);
  const [form,setForm]=useState({});
  const touch=useRef(null);

  function getStats(id){return Object.assign({},STATS[id]||{},userStats[id]||{});}

  function pickWinner(round,idx,winner){
    setBracket(function(prev){
      const next=JSON.parse(JSON.stringify(prev));
      next[round][idx].winner=winner;
      propagate(next,round,idx,winner);
      return next;
    });
  }

  function openCard(game){
    if(!game.winner)return;
    setGameCard(game);
    setForm(getStats(game.id));
  }

  function onTouchStart(e){touch.current=e.touches[0].clientX;}
  function onTouchEnd(e){
    if(touch.current===null)return;
    const dx=touch.current-e.changedTouches[0].clientX;
    if(Math.abs(dx)>50)setActiveRound(function(r){return dx>0?Math.min(r+1,4):Math.max(r-1,0);});
    touch.current=null;
  }

  if(gameCard){
    return React.createElement(GameCard,{game:gameCard,form:form,onClose:function(){setGameCard(null);}});
  }

  const rKey=ROUNDS[activeRound].key;
  const games=bracket[rKey];

  return (
    <div style={{minHeight:"100vh",background:BG,fontFamily:"'Barlow',sans-serif",color:"#1a1a1a",display:"flex",flexDirection:"column"}}>
      <Header/>

      {/* Tabs */}
      <div style={{display:"flex",borderBottom:"2px solid #E8E4DE",background:WHITE,flexShrink:0,overflowX:"auto"}}>
        {ROUNDS.map(function(r,i){
          const active=i===activeRound;
          return (
            <button key={r.key} onClick={function(){setActiveRound(i);}}
              style={{flex:1,minWidth:58,padding:"12px 4px",background:"none",border:"none",
                borderBottom:active?"3px solid "+GOLD:"3px solid transparent",
                color:active?"#1a1a1a":"#999",fontFamily:"'Barlow Condensed',sans-serif",
                fontWeight:800,fontSize:11,letterSpacing:1,textTransform:"uppercase",
                lineHeight:1.4,transition:"all .15s",marginBottom:-2}}>
              {r.label.split(" ").map(function(w,j){return <div key={j}>{w}</div>;})}
              <div style={{fontSize:10,fontWeight:500,marginTop:4,
                color:active?GOLD:"#bbb",letterSpacing:.3,
                fontFamily:"'Barlow',sans-serif",textTransform:"none"}}>
                {r.sub}
              </div>
            </button>
          );
        })}
      </div>

      {/* Round label */}
      <div style={{padding:"12px 16px 4px",flexShrink:0,borderBottom:"1px solid #E8E4DE",background:WHITE}}>
        <div style={{display:"flex",alignItems:"baseline",gap:10}}>
          <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:600,fontSize:24,letterSpacing:1,color:"#1a1a1a"}}>{ROUNDS[activeRound].label.toUpperCase()}</span>
          <span style={{fontSize:13,color:"#999",fontWeight:500,letterSpacing:1}}>{ROUNDS[activeRound].sub}</span>
        </div>
        <div style={{display:"flex",gap:5,marginTop:6,paddingBottom:10}}>
          {ROUNDS.map(function(_,i){
            return <div key={i} onClick={function(){setActiveRound(i);}} style={{width:i===activeRound?20:6,height:4,borderRadius:2,background:i===activeRound?GOLD:"#E0DBD4",transition:"all .2s",cursor:"pointer"}}/>;
          })}
        </div>
      </div>

      {/* Games */}
      <div style={{flex:1,overflowY:"auto",padding:"14px 14px 32px",background:BG}} onTouchStart={onTouchStart} onTouchEnd={onTouchEnd}>
        <div style={{display:"flex",flexDirection:"column",gap:10,maxWidth:520,margin:"0 auto"}}>
          {games.map(function(game,idx){
            const hasStats=!!(STATS[game.id]||userStats[game.id]);
            return <MatchCard key={game.id} game={game} hasStats={hasStats}
              onPick={function(w){pickWinner(rKey,idx,w);}}
              onOpen={function(){openCard(game);}}/>;
          })}
        </div>
        <div style={{textAlign:"center",marginTop:20,fontSize:11,color:"#bbb",letterSpacing:2,fontWeight:500,fontFamily:"'Barlow',sans-serif"}}>
          {activeRound<4?"← Swipe to navigate →":"🏆 Championship"}
        </div>
      </div>
    </div>
  );
}

// ── Match Card ─────────────────────────────────────────────
function MatchCard(props){
  const game=props.game, hasStats=props.hasStats, onPick=props.onPick, onOpen=props.onOpen;
  const done=!!game.winner;
  const wc=done?pc(game.winner):null;

  return (
    <div onClick={done?onOpen:undefined}
      style={{borderRadius:10,overflow:"hidden",cursor:done?"pointer":undefined,background:WHITE,
        border:done?"1px solid rgba("+rgb(wc)+",0.25)":"1px solid #E8E4DE",
        boxShadow:done?"0 2px 16px rgba("+rgb(wc)+",0.12), 0 1px 4px rgba(0,0,0,0.05)":"0 1px 4px rgba(0,0,0,0.05)"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 12px",background:"#F7F5F2",borderBottom:"1px solid #E8E4DE"}}>
        <span style={{fontSize:11,color:"#999",fontWeight:500,letterSpacing:.5}}>{game.time} ET</span>
        {done && <span style={{fontSize:13,fontWeight:600,color:hasStats?GOLD:"#bbb"}}>{hasStats?"Stats ✓":"Tap for stats"}</span>}
      </div>
      {[game.t1,game.t2].map(function(team,ti){
        const isW=game.winner===team, isL=done&&!isW&&team, color=pc(team);
        return (
          <div key={ti}
            onClick={function(e){if(team&&!done){e.stopPropagation();onPick(team);}}}
            style={{display:"flex",alignItems:"center",gap:10,padding:"9px 14px",
              borderBottom:ti===0?"1px solid #F0EDE8":"none",
              cursor:team&&!done?"pointer":"default",opacity:isL?0.4:1,
              background:isW?"rgba("+rgb(color)+",0.07)":WHITE,
              borderLeft:isW?"4px solid "+color:"4px solid transparent",transition:"all .15s"}}
            onMouseEnter={function(e){if(team&&!done)e.currentTarget.style.background="rgba("+rgb(color)+",0.05)";}}
            onMouseLeave={function(e){if(team&&!done)e.currentTarget.style.background=isW?"rgba("+rgb(color)+",0.07)":WHITE;}}>
            <span style={{fontSize:11,color:isW?color:"#bbb",fontWeight:600,minWidth:20}}>{team?SEEDS[team]:""}</span>
            <div style={{width:10,height:10,borderRadius:"50%",background:team?color:"#ddd",flexShrink:0,boxShadow:isW?"0 0 6px rgba("+rgb(color)+",0.6)":undefined}}/>
            <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:isW?700:500,fontSize:18,color:isW?"#1a1a1a":team?"#555":"#ccc",flex:1}}>{team||"TBD"}</span>
            {isW && <span style={{fontSize:14,fontWeight:600,color:color}}>Win ▶</span>}
            {!done&&team && <span style={{fontSize:11,color:"#ccc"}}>Tap</span>}
          </div>
        );
      })}
    </div>
  );
}

// ── Game Card ──────────────────────────────────────────────
function GameCard(props){
  const game=props.game, form=props.form, onClose=props.onClose;
  const t1=game.t1||"Team 1", t2=game.t2||"Team 2";
  const c1=pc(t1), c2=pc(t2);

  function Lbl(p){
    return <div style={{fontSize:9,color:"#999",fontWeight:600,letterSpacing:1.5,marginBottom:3,textTransform:"uppercase",fontFamily:"'Barlow Condensed',sans-serif"}}>{p.children}</div>;
  }
  function Pill(p){
    return (
      <div style={{flex:1,background:"rgba("+rgb(p.color)+",0.07)",border:"1px solid rgba("+rgb(p.color)+",0.2)",borderRadius:8,padding:"8px 6px",textAlign:"center"}}>
        <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:22,color:p.color,lineHeight:1}}>{p.val||"—"}</div>
        <div style={{fontSize:9,color:"#999",fontWeight:600,letterSpacing:1,marginTop:2,fontFamily:"'Barlow Condensed',sans-serif"}}>{p.label}</div>
      </div>
    );
  }

  return (
    <div style={{minHeight:"100vh",background:BG,fontFamily:"'Barlow',sans-serif",color:"#1a1a1a",display:"flex",flexDirection:"column"}}>
      <Header back={onClose} title={t1+" vs "+t2} sub={game.time+" ET"}/>
      <div style={{flex:1,overflowY:"auto",padding:"16px 14px 32px"}}>
        <div style={{maxWidth:520,margin:"0 auto"}}>

          {/* Scores */}
          <div style={{display:"flex",gap:10,marginBottom:14}}>
            {[[t1,c1,"1"],[t2,c2,"2"]].map(function(arr){
              const team=arr[0],col=arr[1],sfx=arr[2];
              return (
                <div key={sfx} style={{flex:1,background:WHITE,border:"1px solid rgba("+rgb(col)+",0.2)",borderTop:"4px solid "+col,borderRadius:10,padding:"12px",textAlign:"center",boxShadow:"0 2px 12px rgba("+rgb(col)+",0.1)"}}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:5,marginBottom:6}}>
                    <div style={{width:8,height:8,borderRadius:"50%",background:col,boxShadow:"0 0 6px rgba("+rgb(col)+",0.6)"}}/>
                    <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:600,fontSize:11,color:"#555"}}>{team}</span>
                    {game.winner===team && <span>🏆</span>}
                  </div>
                  <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:42,color:col,lineHeight:1}}>{form["score"+sfx]||"—"}</div>
                  <div style={{fontSize:8,color:"#bbb",fontWeight:600,letterSpacing:1,marginTop:4,fontFamily:"'Barlow Condensed',sans-serif"}}>FINAL</div>
                </div>
              );
            })}
          </div>

          {/* Quarter scores */}
          <div style={{background:WHITE,border:"1px solid #E8E4DE",borderRadius:10,padding:"12px 14px",marginBottom:14,boxShadow:"0 1px 4px rgba(0,0,0,0.04)"}}>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:11,color:"#1a1a1a",letterSpacing:2,marginBottom:10,borderBottom:"1px solid #F0EDE8",paddingBottom:6}}>QUARTER SCORES</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr repeat(4,1fr)",gap:6,alignItems:"center"}}>
              <div/>
              {["Q1","Q2","Q3","Q4"].map(function(q){return <div key={q} style={{textAlign:"center",fontSize:9,color:"#bbb",fontWeight:600,letterSpacing:1,fontFamily:"'Barlow Condensed',sans-serif"}}>{q}</div>;})}
              {[[t1,c1,"1"],[t2,c2,"2"]].map(function(arr){
                const team=arr[0],col=arr[1],sfx=arr[2];
                return [
                  <div key={"l"+sfx} style={{fontSize:11,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:600,color:"#555",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{team.split(" ").pop()}</div>,
                  [1,2,3,4].map(function(q){
                    return <div key={"q"+q+sfx} style={{textAlign:"center",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:15,color:col,background:"rgba("+rgb(col)+",0.07)",borderRadius:5,padding:"6px 2px"}}>{form["q"+q+"_"+sfx]||"—"}</div>;
                  })
                ];
              })}
            </div>
          </div>

          {/* Team panels */}
          <div style={{display:"flex",gap:10,marginBottom:14}}>
            {[[t1,c1,"1"],[t2,c2,"2"]].map(function(arr){
              const team=arr[0],col=arr[1],sfx=arr[2];
              return (
                <div key={sfx} style={{flex:1,background:WHITE,border:"1px solid rgba("+rgb(col)+",0.2)",borderRadius:10,padding:"12px",boxShadow:"0 2px 10px rgba("+rgb(col)+",0.08)"}}>
                  <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:10,paddingBottom:8,borderBottom:"1px solid rgba("+rgb(col)+",0.15)"}}>
                    <div style={{width:8,height:8,borderRadius:"50%",background:col,boxShadow:"0 0 5px rgba("+rgb(col)+",0.6)"}}/>
                    <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:11,color:"#555",textTransform:"uppercase"}}>{team.split(" ").pop()}</span>
                  </div>
                  <div style={{display:"flex",gap:6,marginBottom:12}}>
                    <Pill val={form["reb"+sfx]} label="REB" color={col}/>
                    <Pill val={form["ast"+sfx]} label="AST" color={col}/>
                  </div>
                  <Lbl>🏅 Top Scorer</Lbl>
                  <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:14,color:"#1a1a1a",marginBottom:2}}>{form["star"+sfx]||"—"}</div>
                  <div style={{fontSize:11,color:"#777",fontWeight:500}}>{form["starSt"+sfx]||"—"}</div>
                </div>
              );
            })}
          </div>

          {/* Notes */}
          <div style={{background:WHITE,border:"1px solid #E8E4DE",borderLeft:"4px solid "+GOLD,borderRadius:10,padding:"12px 14px",marginBottom:16}}>
            <Lbl>Game Notes</Lbl>
            <div style={{fontSize:13,color:"#444",lineHeight:1.7,fontWeight:400}}>{form.notes||"—"}</div>
          </div>

          <button onClick={onClose} style={{width:"100%",background:NAVY,color:GOLD,border:"none",borderRadius:8,padding:"13px 0",fontFamily:"'Barlow',sans-serif",fontWeight:600,fontSize:13,letterSpacing:2,textTransform:"uppercase"}}>
            ← Back to Bracket
          </button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
