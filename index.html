function initBracket() {
  const b = {
    r1:[
      {id:"g1",t1:"Arkansas",         t2:"Kentucky", winner:null,time:"11:00 AM"},
      {id:"g2",t1:"Mississippi State",t2:"Florida",  winner:null,time:"1:30 PM"},
      {id:"g3",t1:"Auburn",           t2:"Texas A&M",winner:null,time:"6:00 PM"},
      {id:"g4",t1:"Missouri",         t2:"Alabama",  winner:null,time:"8:30 PM"},
    ],
    r2:[
      {id:"g5",t1:"Kentucky",t2:"Georgia",  winner:null,time:"11:00 AM"},
      {id:"g6",t1:"Florida", t2:"Oklahoma", winner:null,time:"1:30 PM"},
      {id:"g7",t1:"Auburn",  t2:"Ole Miss", winner:null,time:"6:00 PM"},
      {id:"g8",t1:"Alabama", t2:"Tennessee",winner:null,time:"8:30 PM"},
    ],
    qf:[
      {id:"g9", t1:"South Carolina",t2:null,winner:null,time:"12:00 PM"},
      {id:"g10",t1:"LSU",           t2:null,winner:null,time:"2:30 PM"},
      {id:"g11",t1:"Vanderbilt",    t2:null,winner:null,time:"6:00 PM"},
      {id:"g12",t1:"Texas",         t2:null,winner:null,time:"8:30 PM"},
    ],
    sf:[
      {id:"g13",t1:null,t2:null,winner:null,time:"4:30 PM"},
      {id:"g14",t1:null,t2:null,winner:null,time:"7:00 PM"},
    ],
    fin:[{id:"g15",t1:null,t2:null,winner:null,time:"3:00 PM"}],
  };
  // R1 winners
  b.r1[0].winner="Kentucky";
  b.r1[1].winner="Florida";
  b.r1[2].winner="Auburn";
  b.r1[3].winner="Alabama";
  // R2 winners
  b.r2[0].winner="Kentucky";
  b.r2[1].winner="Oklahoma";
  b.r2[2].winner="Ole Miss";
  b.r2[3].winner="Alabama";
  // propagate R2 winners into QF slots
  b.qf[0].t2="Kentucky";
  b.qf[1].t2="Oklahoma";
  b.qf[2].t2="Ole Miss";
  b.qf[3].t2="Alabama";
  // QF winners
  b.qf[0].winner="South Carolina";
  b.sf[0].t1="South Carolina";
  b.qf[1].winner="LSU";
  b.sf[0].t2="LSU";
  b.qf[2].winner="Ole Miss";
  b.sf[1].t1="Ole Miss";
  return b;
}

function propagate(b,round,idx,w){
  if(round==="r1") b.r2[idx].t1=w;
  if(round==="r2") b.qf[idx].t2=w;
  if(round==="qf"){var s=idx<2?0:1; idx%2===0?(b.sf[s].t1=w):(b.sf[s].t2=w);}
  if(round==="sf") idx===0?(b.fin[0].t1=w):(b.fin[0].t2=w);
}

function pc(t){return t&&SC[t]?SC[t]:"#aaa";}
function rgb(h){
  if(!h||h.length<7)return"100,100,100";
  return parseInt(h.slice(1,3),16)+","+parseInt(h.slice(3,5),16)+","+parseInt(h.slice(5,7),16);
}
function getStats(id,us){return Object.assign({},STATS[id]||{},us[id]||{});}

      el("div",null,
        el("div",{style:{fontFamily:F,fontWeight:700,fontSize:15,color:WHITE,letterSpacing:.5}},props.title),
        el("div",{style:{fontSize:11,color:GOLD,fontWeight:500,fontFamily:F,marginTop:1}},props.sub)

    );
  }
  return el("div",{style:{background:NAVY,borderBottom:"3px solid "+GOLD,padding:"14px 16px",textAlign:"center",flexShrink:0}},
    el("div",{style:{fontSize:9,letterSpacing:4,color:GOLD,fontWeight:600,fontFamily:F,marginBottom:3,opacity:.85}},"2026 · GREENVILLE, SC"),

}

function MatchCard(props){
  var game=props.game,hasStats=props.hasStats,onPick=props.onPick,onOpen=props.onOpen;
  var done=!!game.winner,wc=done?pc(game.winner):null;
  return el("div",{
    onClick:done?onOpen:undefined,
    style:{borderRadius:10,overflow:"hidden",cursor:done?"pointer":undefined,background:WHITE,
      border:done?"1px solid rgba("+rgb(wc)+",0.25)":"1px solid #E8E4DE",
      boxShadow:done?"0 2px 16px rgba("+rgb(wc)+",0.12),0 1px 4px rgba(0,0,0,0.05)":"0 1px 4px rgba(0,0,0,0.05)"}},
    el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 12px",background:"#F7F5F2",borderBottom:"1px solid #E8E4DE"}},
      el("span",{style:{fontSize:11,color:"#999",fontWeight:500}},game.time+" ET"),
      done?el("span",{style:{fontSize:12,fontWeight:600,color:hasStats?GOLD:"#bbb"}},hasStats?"Stats ✓":"Tap for stats"):null
    ),
    [game.t1,game.t2].map(function(team,ti){
      var isW=game.winner===team,isL=done&&!isW&&team,color=pc(team);
      return el("div",{
        key:ti,
        onClick:function(ev){if(team&&!done){ev.stopPropagation();onPick(team);}},
        onMouseEnter:function(ev){if(team&&!done)ev.currentTarget.style.background="rgba("+rgb(color)+",0.05)";},
        onMouseLeave:function(ev){if(team&&!done)ev.currentTarget.style.background=isW?"rgba("+rgb(color)+",0.07)":WHITE;},
        style:{display:"flex",alignItems:"center",gap:10,padding:"9px 14px",
          borderBottom:ti===0?"1px solid #F0EDE8":"none",
          cursor:team&&!done?"pointer":"default",opacity:isL?0.4:1,
          background:isW?"rgba("+rgb(color)+",0.07)":WHITE,
          borderLeft:isW?"4px solid "+color:"4px solid transparent",transition:"all .15s"}},
        el("span",{style:{fontSize:11,color:isW?color:"#bbb",fontWeight:600,minWidth:20,fontFamily:F}},team?SEEDS[team]:""),
        el("div",{style:{width:10,height:10,borderRadius:"50%",background:team?color:"#ddd",flexShrink:0,boxShadow:isW?"0 0 6px rgba("+rgb(color)+",0.6)":undefined}}),
        el("span",{style:{fontFamily:F,fontWeight:isW?700:500,fontSize:16,color:isW?"#1a1a1a":team?"#555":"#ccc",flex:1}},team||"TBD"),
        isW?el("span",{style:{fontSize:13,fontWeight:600,color:color,fontFamily:F}},"Win ▶"):null,
        (!done&&team)?el("span",{style:{fontSize:11,color:"#ccc",fontFamily:F}},"Tap"):null
      );
    })
  );
}

            ["Q1","Q2","Q3","Q4"].map(function(q){return el("div",{key:q,style:{textAlign:"center",fontSize:9,color:"#bbb",fontWeight:600,letterSpacing:1,fontFamily:F}},q);}),
            [[t1,c1,"1"],[t2,c2,"2"]].map(function(arr){

          el("div",{style:{fontSize:13,color:"#444",lineHeight:1.7,fontWeight:400,fontFamily:F}},form.notes||"—")
        ),

        el("button",{onClick:onClose,style:{width:"100%",background:NAVY,color:GOLD,border:"none",borderRadius:8,padding:"13px 0",fontFamily:F,fontWeight:600,fontSize:13,letterSpacing:1,textTransform:"uppercase"}},"← Back to Bracket")
      )
    )
  );
}

function App(){
  var s=useState(initBracket),bracket=s[0],setBracket=s[1];
  var u=useState({}),userStats=u[0],setUserStats=u[1];
  var r=useState(2),activeRound=r[0],setActiveRound=r[1];
  var g=useState(null),gameCard=g[0],setGameCard=g[1];
  var f=useState({}),form=f[0],setForm=f[1];
  var touch=useRef(null);

  function pickWinner(round,idx,winner){
    setBracket(function(prev){
      var next=JSON.parse(JSON.stringify(prev));
      next[round][idx].winner=winner;
      propagate(next,round,idx,winner);
      return next;
    });
  }

  function openCard(game){
    if(!game.winner)return;
    setGameCard(game);
    setForm(getStats(game.id,userStats));
  }

  function onTouchStart(ev){touch.current=ev.touches[0].clientX;}
  function onTouchEnd(ev){
    if(touch.current===null)return;
    var dx=touch.current-ev.changedTouches[0].clientX;
    if(Math.abs(dx)>50)setActiveRound(function(v){return dx>0?Math.min(v+1,4):Math.max(v-1,0);});
    touch.current=null;
  }

  if(gameCard){
    return el(GameCard,{game:gameCard,form:form,onClose:function(){setGameCard(null);}});
  }

  var rKey=ROUNDS[activeRound].key;
  var games=bracket[rKey];

  return el("div",{style:{minHeight:"100vh",background:BG,fontFamily:F,color:"#1a1a1a",display:"flex",flexDirection:"column"}},
    el(Header,null),
    el("div",{style:{display:"flex",borderBottom:"2px solid #E8E4DE",background:WHITE,flexShrink:0,overflowX:"auto"}},
      ROUNDS.map(function(round,i){
        var active=i===activeRound;
        return el("button",{key:round.key,onClick:function(){setActiveRound(i);},
          style:{flex:1,minWidth:58,padding:"12px 4px",background:"none",border:"none",
            borderBottom:active?"3px solid "+GOLD:"3px solid transparent",
            color:active?"#1a1a1a":"#999",fontFamily:F,fontWeight:700,fontSize:10,
            letterSpacing:.5,textTransform:"uppercase",lineHeight:1.4,
            transition:"all .15s",marginBottom:-2}},
          round.label.split(" ").map(function(w,j){return el("div",{key:j},w);}),
          el("div",{style:{fontSize:10,fontWeight:500,marginTop:4,color:active?GOLD:"#bbb",letterSpacing:.3,fontFamily:F,textTransform:"none"}},round.sub)
        );
      })
    ),
    el("div",{style:{padding:"12px 16px 4px",flexShrink:0,borderBottom:"1px solid #E8E4DE",background:WHITE}},
      el("div",{style:{display:"flex",alignItems:"baseline",gap:10}},
        el("span",{style:{fontFamily:F,fontWeight:700,fontSize:22,letterSpacing:.5,color:"#1a1a1a"}},ROUNDS[activeRound].label.toUpperCase()),
        el("span",{style:{fontSize:13,color:"#999",fontWeight:500}},ROUNDS[activeRound].sub)
      ),
      el("div",{style:{display:"flex",gap:5,marginTop:6,paddingBottom:10}},
        ROUNDS.map(function(_,i){
          return el("div",{key:i,onClick:function(){setActiveRound(i);},
            style:{width:i===activeRound?20:6,height:4,borderRadius:2,
              background:i===activeRound?GOLD:"#E0DBD4",transition:"all .2s",cursor:"pointer"}});
        })
      )
    ),
    el("div",{style:{flex:1,overflowY:"auto",padding:"14px 14px 32px",background:BG},onTouchStart:onTouchStart,onTouchEnd:onTouchEnd},
      el("div",{style:{display:"flex",flexDirection:"column",gap:10,maxWidth:520,margin:"0 auto"}},
        games.map(function(game,idx){
          var hasStats=!!(STATS[game.id]||userStats[game.id]);
          return el(MatchCard,{key:game.id,game:game,hasStats:hasStats,
            onPick:function(w){pickWinner(rKey,idx,w);},
            onOpen:function(){openCard(game);}});
        })
      ),
      el("div",{style:{textAlign:"center",marginTop:20,fontSize:11,color:"#bbb",letterSpacing:1,fontWeight:500,fontFamily:F}},
        activeRound<4?"← Swipe to navigate →":"🏆 Championship"
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(el(App,null));
</script>
</body>
</html>
